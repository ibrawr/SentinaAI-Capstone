# docker-compose.yml — EMQX 5.x broker (NFR-26, NFR-27, NFR-28, NFR-29)
#
# Prerequisites:
#   1. Generate TLS certificates:  bash scripts/gen_certs.sh
#   2. Start the broker:           docker compose up -d
#   3. Run tests:                  python scripts/test_emqx.py
#   4. Change dashboard password:  http://localhost:18083  (admin / SentinaAdmin_CHANGEME!)
#
# If you are new to Docker, see DOCKER_PRIMER.md first.

services:
  broker:
    image: emqx/emqx:5.8     # pin to a specific minor version in production
    container_name: sentina-emqx
    restart: unless-stopped

    environment:
      ## Secrets — never put these in emqx.conf (commit risk)
      - EMQX_NODE__COOKIE=sentina_emqx_cookie_CHANGEME
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=SentinaAdmin_CHANGEME!

      ## NFR-28: Disable plain-text listeners via env var.
      ## emqx.conf listeners{} is silently rejected in EMQX 5.8 (known schema issue);
      ## env vars are processed after the file and reliably override defaults.
      - EMQX_LISTENERS__TCP__DEFAULT__ENABLE=false
      - EMQX_LISTENERS__WS__DEFAULT__ENABLE=false

      ## NFR-26: mTLS — point ssl listener at our generated certs
      - EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__KEYFILE=/etc/emqx/certs/server.key
      - EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CERTFILE=/etc/emqx/certs/server.crt
      - EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__CACERTFILE=/etc/emqx/certs/ca.crt
      - EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__VERIFY=verify_peer
      - EMQX_LISTENERS__SSL__DEFAULT__SSL_OPTIONS__FAIL_IF_NO_PEER_CERT=true
      ## Map client cert CN to MQTT username (used by ACL rules as ${username})
      - EMQX_LISTENERS__SSL__DEFAULT__PEER_CERT_AS_USERNAME=cn

      ## NFR-27: Authorization — force default-deny and point at our ACL file
      ## emqx.conf authorization{} block is silently rejected by EMQX 5.8 hocon-lib;
      ## env vars reliably override the compiled-in defaults.
      - EMQX_AUTHORIZATION__NO_MATCH=deny
      - EMQX_AUTHORIZATION__DENY_ACTION=disconnect

    ports:
      # NFR-28: ONLY the TLS MQTT port is published externally.
      - "8883:8883"

      # Dashboard — published on all interfaces here for first-time setup convenience.
      # NFR-29: In production, change to "127.0.0.1:18083:18083" (loopback-only)
      #         or remove entirely and access via SSH tunnel:
      #         ssh -L 18083:localhost:18083 user@server
      - "18083:18083"

    volumes:
      # Main HOCON config (read-only inside container)
      - ./emqx.conf:/etc/emqx/emqx.conf:ro

      # Authorization ACL rules — mounted at the path EMQX actually reads.
      # EMQX_ETC_DIR resolves to /opt/emqx/etc (not /etc/emqx), so the correct
      # mount target is /opt/emqx/etc/acl.conf.
      - ./authz/acl.conf:/opt/emqx/etc/acl.conf:ro

      # TLS certificates — generated by scripts/gen_certs.sh
      # Mount read-only; private keys are never written by EMQX
      - ./certs:/etc/emqx/certs:ro

      # Persistent data: session state, retained messages, built-in DB
      - emqx_data:/var/lib/emqx

      # Broker logs (mount if you need to inspect them from the host)
      - emqx_log:/var/log/emqx

    networks:
      - iot_net

    # NFR-29: Principle of least privilege inside the container
    security_opt:
      - no-new-privileges:true

    # NFR-29: Drop all Linux capabilities, add back only what EMQX needs
    # EMQX needs NET_BIND_SERVICE to bind to port 8883 (< 1024 would need it,
    # but 8883 > 1024 so we can drop it too).
    cap_drop:
      - ALL

    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  emqx_data:
    driver: local
  emqx_log:
    driver: local

networks:
  # NFR-29: Dedicated bridge network for IoT traffic.
  # Containers on this network cannot reach the default Docker bridge.
  iot_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
    driver_opts:
      # Disable direct container-to-container communication (ICC).
      # All traffic must pass through the broker — devices cannot talk to each other.
      com.docker.network.bridge.enable_icc: "false"
