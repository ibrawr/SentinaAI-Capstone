%% authz/acl.conf — EMQX 5.x file-based authorization (NFR-27)
%%
%% Format: Erlang term tuples, one rule per line, terminated with a period.
%% Each rule: {Permission, Who, Action, TopicFilters}.
%%
%% Permission : allow | deny
%% Who        : all
%%            | {user,     "mqtt-username"}    %% matches MQTT username field
%%            | {clientid, "client-id"}        %% matches MQTT client ID
%%            | {ipaddr,   "ip-or-cidr"}       %% matches source IP
%% Action     : all | publish | subscribe
%% Topics     : list of topic filter strings; ${username} = username, ${clientid} = clientid
%%
%% Rules are evaluated top-to-bottom; first match wins.
%% If no rule matches, emqx.conf authorization.no_match = deny applies.
%%
%% Topic namespace:
%%   sentina/devices/<device-id>/<reading-type>   <- devices publish here
%%   sentina/commands/<device-id>/<cmd>            <- devices subscribe here
%%   sentina/aggregated/<hall-id>/<metric>         <- edge-node publishes
%%   sentina/alerts/<hall-id>                      <- edge-node publishes
%%
%% ${username} is substituted with the connecting client's MQTT username.
%% With peer_cert_as_username = cn, ${username} = the device's cert CN.

%%--------------------------------------------------------------------
%% Edge / bridge node (Node-RED or gateway service)
%% Username: "edge-node"  (from its client cert CN)
%%--------------------------------------------------------------------

%% Edge reads all device sensor data
{allow, {user, "edge-node"}, subscribe, ["sentina/devices/#"]}.

%% Edge publishes aggregated metrics and alerts
{allow, {user, "edge-node"}, publish,   ["sentina/aggregated/#"]}.
{allow, {user, "edge-node"}, publish,   ["sentina/alerts/#"]}.

%% Edge sends commands to individual devices
{allow, {user, "edge-node"}, publish,   ["sentina/commands/#"]}.

%% Edge may read its own command channel (e.g. management commands from backend)
{allow, {user, "edge-node"}, subscribe, ["sentina/commands/edge-node/#"]}.

%%--------------------------------------------------------------------
%% Backend application service account
%% Username: "sentina-backend"  (from its client cert CN)
%%--------------------------------------------------------------------

%% Backend reads aggregated data and alerts
{allow, {user, "sentina-backend"}, subscribe, ["sentina/aggregated/#"]}.
{allow, {user, "sentina-backend"}, subscribe, ["sentina/alerts/#"]}.

%% Backend sends commands to devices (via the edge or directly)
{allow, {user, "sentina-backend"}, publish,   ["sentina/commands/#"]}.

%%--------------------------------------------------------------------
%% Individual IoT field devices
%% Username: cert CN  (e.g. "sensor-HZA01-occ", "sensor-HZB03-temp")
%% %u is substituted per-connection, so no per-device ACL lines needed.
%%--------------------------------------------------------------------

%% Devices may publish ONLY to their own namespace (cert CN = ${username})
{allow, all, publish,   ["sentina/devices/${username}/#"]}.

%% Devices may subscribe ONLY to commands addressed to them
{allow, all, subscribe, ["sentina/commands/${username}/#"]}.

%%--------------------------------------------------------------------
%% Explicit deny for privileged / system topics
%%--------------------------------------------------------------------

%% No device or service may publish/subscribe to EMQX system topics
%% ($SYS/# is reserved for EMQX internal metrics)
{deny, all, all, ["$SYS/#"]}.

%% Deny everything not matched above (belt-and-suspenders — emqx.conf also says deny)
{deny, all}.
