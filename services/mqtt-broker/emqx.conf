## emqx.conf — EMQX 5.x HOCON configuration
##
## NFR-26: IoT device authentication via mTLS (client certificates signed by our CA).
##         No anonymous connections. TLS cert CN is mapped to MQTT username.
## NFR-27: Per-device topic ACLs enforced via file-based authorizer.
##         Devices can only publish to their own topic namespace.
## NFR-28: Broker listens ONLY on TLS port 8883.
##         Plain-text ports 1883 and 8083 (WS) are explicitly disabled.
##
## EMQX version: 5.x (tested against 5.4+)
## Config reference: https://www.emqx.io/docs/en/latest/configuration/configuration-manual.html

##--------------------------------------------------------------------
## Cluster — single-node (expand to multi-node by changing discovery_strategy)
##--------------------------------------------------------------------
cluster {
  name               = emqxcl
  discovery_strategy = manual
}

##--------------------------------------------------------------------
## Node identity
##--------------------------------------------------------------------
node {
  name     = "emqx@127.0.0.1"
  ## Change cookie to a strong random value in production.
  ## All nodes in a cluster must share the same cookie.
  cookie   = "sentina_emqx_cookie_CHANGEME"
  data_dir = "data"
}

##--------------------------------------------------------------------
## Dashboard (Management Web UI)
## NFR-29: Bind dashboard to loopback only — never expose to 0.0.0.0 in production.
## Access via: http://localhost:18083  (after SSH tunnel on remote servers)
##--------------------------------------------------------------------
dashboard {
  listeners.http {
    bind = "0.0.0.0:18083"   ## loopback-only: change to "127.0.0.1:18083" on bare-metal
  }

  ## IMPORTANT: Change this password immediately via the dashboard on first login.
  ## It is only used on very first boot (before any admin account exists in the DB).
  default_username = "admin"
  default_password = "SentinaAdmin_CHANGEME!"
}

##--------------------------------------------------------------------
## Listeners — NFR-28: TLS only; all plain-text ports disabled
## Use top-level dotted-path syntax as required by EMQX 5.x hocon-lib.
##--------------------------------------------------------------------

## Plain-text MQTT — DISABLED (NFR-28)
listeners.tcp.default {
  enable = false
  bind   = "0.0.0.0:1883"
}

## Plain-text WebSocket MQTT — DISABLED (NFR-28)
listeners.ws.default {
  enable = false
  bind   = "0.0.0.0:8083"
}

## Mutual-TLS MQTT — the ONLY active listener (NFR-28)
listeners.ssl.default {
  enable = true
  bind   = "0.0.0.0:8883"

  ## Map client cert CN to MQTT username — used by ACL rules as ${username}
  peer_cert_as_username = cn

  ssl_options {
    ## Broker certificate and private key
    keyfile    = "/etc/emqx/certs/server.key"
    certfile   = "/etc/emqx/certs/server.crt"

    ## CA that signed ALL device client certs (and the server cert)
    cacertfile = "/etc/emqx/certs/ca.crt"

    ## NFR-26: Require a valid client certificate from every connecting device
    verify               = verify_peer
    fail_if_no_peer_cert = true

    ## NFR-28: Enforce TLS 1.2 minimum (TLS 1.3 preferred)
    versions = ["tlsv1.3", "tlsv1.2"]
  }
}

##--------------------------------------------------------------------
## Authentication — NFR-26
##
## Because we set verify_peer + fail_if_no_peer_cert + cacertfile on the
## TLS listener, the TLS handshake itself is the authentication step:
##   - Clients without a cert → TLS rejected before MQTT CONNECT
##   - Clients with a cert not signed by our CA → TLS rejected
##   - Clients with a valid CA-signed cert → TLS accepted, MQTT CONNECT proceeds
##
## We therefore leave the MQTT-level authentication chain EMPTY.
## EMQX 5.x treats an empty chain as "no additional MQTT auth required",
## which is correct here — the TLS layer already authenticated the device.
##
## The cert CN (extracted by peer_cert_as_username = cn) is used as the
## identity for authorization (ACL) rules below.
##--------------------------------------------------------------------
authentication = []

##--------------------------------------------------------------------
## Authorization / Topic ACLs — NFR-27
##
## Rules live in authz/acl.conf (Erlang term format).
## Devices can only publish to their own topic namespace (keyed on %u = cert CN).
##--------------------------------------------------------------------
authorization {
  ## Deny anything not explicitly allowed (NFR-27 default-deny)
  no_match    = deny

  ## Disconnect the client immediately on authorization failure (not just drop the message)
  deny_action = disconnect

  ## Cache decisions for performance (safe since rules are static)
  cache {
    enable   = true
    max_size = 32
    ttl      = 1m
  }

  sources = [
    {
      type   = file
      enable = true
      path   = "/opt/emqx/etc/acl.conf"
    }
  ]
}

##--------------------------------------------------------------------
## MQTT protocol settings
##--------------------------------------------------------------------
mqtt {
  ## Reject CONNECT packets that carry no credentials.
  ## Since peer_cert_as_username = cn populates the username automatically
  ## from the TLS cert, every legitimately connected device has a username.
  allow_anonymous = false

  ## Sanity-limit on packet size to prevent memory exhaustion attacks
  max_packet_size = 1MB
}

##--------------------------------------------------------------------
## Logging
##--------------------------------------------------------------------
log {
  file {
    enable = true
    level  = warning
    path   = "/var/log/emqx/emqx.log"
  }
  console {
    enable = true
    level  = warning
  }
}
